<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Website</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      background-color: #f5f5f5;
      margin: 0;
      padding: 20px;
    }
    h1 {
      color: #333;
    }
    .gallery {
      display: flex;
      justify-content: center;
      gap: 15px;
      flex-wrap: wrap;
      margin-top: 20px;
    }
    .gallery img {
      width: 250px;
      height: 250px;
      object-fit: cover;
      border-radius: 10px;
      box-shadow: 0 4px 8px rgba(0,0,0,0.2);
    }
  </style>
</head>
<body>
  <h1>Welcome to My Website</h1>
  <p>This is my first site on GitHub Pages!</p>
  
  <h2>My Photos</h2>
  <div class="gallery">
    <img src="photo1.jpg.jpeg" alt="My photo 1">
    <img src="photo2.jpg.jpeg" alt="My photo 2">
    <img src="photo3.jpg.jpeg" alt="My photo 3">
  </div>
</body>
</html>
