<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GNF - Login</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
<style>
    * { margin:0; padding:0; box-sizing:border-box; font-family:'Poppins',sans-serif; }
  body {
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    color: white;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 20px;
  }
  .card {
    background: rgba(255,255,255,0.1);
    padding: 40px;
    border-radius: 12px;
    width: 100%;
    max-width: 400px;
    backdrop-filter: blur(10px);
  }
  h1 { text-align:center; margin-bottom:10px; font-size:32px; }
  p { text-align:center; opacity:0.9; margin-bottom:25px; }
  input {
    width: 100%;
    padding: 12px 15px;
    margin-bottom: 15px;
    border: none;
    border-radius: 8px;
    font-size: 16px;
    background: rgba(255,255,255,0.9);
    color: #333;
  }
  button {
    width: 100%;
    padding: 12px;
    background: white;
    color: #764ba2;
    border: none;
    border-radius: 8px;
    font-weight: 600;
    font-size: 16px;
    cursor: pointer;
    margin-top: 10px;
  }
  button:hover { background: #764ba2; color: white; border: 2px solid white; }
  .toggle { text-align:center; margin-top:15px; cursor:pointer; opacity:0.9; }
  .msg { text-align:center; margin-top:15px; font-size:14px; }
  .error { color:#ff6b6b; }
  .success { color:#51cf66; }
</style>
</head>
<body>
  <div class="card">
    <h1>GNF Site</h1>
    <p id="form-desc">Login to view my profile</p>
    <input type="email" id="email" placeholder="Email" required>
    <input type="password" id="password" placeholder="Password" required>
    <button id="submit-btn">Login</button>
    <div class="toggle" id="toggle-mode">Don't have an account? Sign up</div>
    <div class="msg" id="message"></div>
  </div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { 
  getAuth, 
  signInWithEmailAndPassword, 
  createUserWithEmailAndPassword,
  sendEmailVerification 
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyAk2qhOydgf_Aqzg0Zw4Cg_8f3280eCEBs",
  authDomain: "gnf-site.firebaseapp.com",
  projectId: "gnf-site",
  storageBucket: "gnf-site.firebasestorage.app",
  messagingSenderId: "433011079570",
  appId: "1:433011079570:web:79981578237f0562e5294b",
  measurementId: "G-W431C4HMND"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

let isLogin = true;
const desc = document.getElementById('form-desc');
const btn = document.getElementById('submit-btn');
const toggle = document.getElementById('toggle-mode');
const msg = document.getElementById('message');

toggle.onclick = () => {
  isLogin = !isLogin;
  desc.textContent = isLogin ? 'Login to view my profile' : 'Create account to view my profile';
  btn.textContent = isLogin ? 'Login' : 'Sign Up';
  toggle.textContent = isLogin ? "Don't have an account? Sign up" : "Already have an account? Login";
  msg.textContent = '';
};

btn.onclick = async () => {
  const email = document.getElementById('email').value;
  const password = document.getElementById('password').value;
  msg.textContent = '';
  msg.className = 'msg';

  try {
    if (isLogin) {
      const userCred = await signInWithEmailAndPassword(auth, email, password);
      if (!userCred.user.emailVerified) {
        msg.textContent = 'Please verify your email first';
        msg.className = 'msg error';
        return;
      }
      window.location.href = 'dashboard.html';
    } else {
      const userCred = await createUserWithEmailAndPassword(auth, email, password);
      await sendEmailVerification(userCred.user);
      msg.textContent = 'Account created! Check your email to verify';
      msg.className = 'msg success';
    }
  } catch (error) {
    msg.textContent = error.message;
    msg.className = 'msg error';
  }
};
</script>
</body>
</html>
