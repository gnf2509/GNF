<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GNF - Login</title>
<style>
    * { box-sizing: border-box; font-family: system-ui, Arial, sans-serif; }
  body { 
    background: #0f172a; 
    color: #e2e8f0; 
    display: flex; 
    align-items: center; 
    justify-content: center; 
    min-height: 100vh; 
    margin: 0;
  }
  .card {
    background: #1e293b;
    padding: 2rem;
    border-radius: 12px;
    width: 100%;
    max-width: 380px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.3);
  }
  h2 { margin: 0 0 1.5rem 0; text-align: center; }
  input {
    width: 100%;
    padding: 12px;
    margin: 8px 0;
    border: 1px solid #334155;
    border-radius: 8px;
    background: #0f172a;
    color: #e2e8f0;
    font-size: 15px;
  }
  button {
    width: 100%;
    padding: 12px;
    margin-top: 12px;
    border: none;
    border-radius: 8px;
    background: #3b82f6;
    color: white;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
  }
  button:hover { background: #2563eb; }
  .toggle {
    text-align: center;
    margin-top: 1rem;
    color: #94a3b8;
    cursor: pointer;
    font-size: 14px;
  }
  .toggle:hover { color: #e2e8f0; }
  .error { color: #f87171; font-size: 14px; margin-top: 10px; text-align: center; }
  .success { color: #4ade80; font-size: 14px; margin-top: 10px; text-align: center; }
</style>
</head>
<body>
  <div class="card">
    <h2 id="form-title">Login</h2>
    <input type="email" id="email" placeholder="Email" required>
    <input type="password" id="password" placeholder="Password" required>
    <button id="submit-btn">Login</button>
    <div class="toggle" id="toggle-mode">Don't have an account? Sign up</div>
    <div id="message"></div>
  </div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { 
  getAuth, 
  signInWithEmailAndPassword, 
  createUserWithEmailAndPassword,
  sendEmailVerification 
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyAk2qhOydgf_Aqzg0Zw4Cg_8f3280eCEBs",
  authDomain: "gnf-site.firebaseapp.com",
  projectId: "gnf-site",
  storageBucket: "gnf-site.firebasestorage.app",
  messagingSenderId: "433011079570",
  appId: "1:433011079570:web:79981578237f0562e5294b",
  measurementId: "G-W431C4HMND"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

let isLogin = true;
const title = document.getElementById('form-title');
const btn = document.getElementById('submit-btn');
const toggle = document.getElementById('toggle-mode');
const msg = document.getElementById('message');

toggle.onclick = () => {
  isLogin = !isLogin;
  title.textContent = isLogin ? 'Login' : 'Sign Up';
  btn.textContent = isLogin ? 'Login' : 'Sign Up';
  toggle.textContent = isLogin 
    ? "Don't have an account? Sign up" 
    : "Already have an account? Login";
  msg.textContent = '';
};

btn.onclick = async () => {
  const email = document.getElementById('email').value;
  const password = document.getElementById('password').value;
  msg.textContent = '';
  msg.className = '';

  try {
    if (isLogin) {
      const userCred = await signInWithEmailAndPassword(auth, email, password);
      if (!userCred.user.emailVerified) {
        msg.textContent = 'Please verify your email first. Check your inbox.';
        msg.className = 'error';
        return;
      }
      window.location.href = 'dashboard.html';
    } else {
      const userCred = await createUserWithEmailAndPassword(auth, email, password);
      await sendEmailVerification(userCred.user);
      msg.textContent = 'Account created! Check your email to verify.';
      msg.className = 'success';
    }
  } catch (error) {
    msg.textContent = error.message;
    msg.className = 'error';
  }
};
</script>
</body>
</html>


<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GNF - Dashboard</title>
<style>
  body {
    background: #0f172a;
    color: #e2e8f0;
    font-family: system-ui, Arial, sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    margin: 0;
  }
  .card {
    background: #1e293b;
    padding: 2rem;
    border-radius: 12px;
    text-align: center;
    max-width: 500px;
  }
  button {
    padding: 12px 24px;
    margin-top: 20px;
    border: none;
    border-radius: 8px;
    background: #ef4444;
    color: white;
    font-weight: 600;
    cursor: pointer;
  }
  button:hover { background: #dc2626; }
</style>
</head>
<body>
  <div class="card">
    <h1>Welcome!</h1>
    <p id="user-email">Loading...</p>
    <p>You're logged in to GNF Site.</p>
    <button id="logout-btn">Logout</button>
  </div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { 
  getAuth, 
  onAuthStateChanged, 
  signOut 
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyAk2qhOydgf_Aqzg0Zw4Cg_8f3280eCEBs",
  authDomain: "gnf-site.firebaseapp.com",
  projectId: "gnf-site",
  storageBucket: "gnf-site.firebasestorage.app",
  messagingSenderId: "433011079570",
  appId: "1:433011079570:web:79981578237f0562e5294b",
  measurementId: "G-W431C4HMND"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

onAuthStateChanged(auth, (user) => {
  if (user) {
    if (!user.emailVerified) {
      window.location.href = 'index.html';
      return;
    }
    document.getElementById('user-email').textContent = user.email;
  } else {
    window.location.href = 'index.html';
  }
});

document.getElementById('logout-btn').onclick = async () => {
  await signOut(auth);
  window.location.href = 'index.html';
};
</script>
</body>
</html>
